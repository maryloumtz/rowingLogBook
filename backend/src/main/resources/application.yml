server:
  port: 8080

spring:
  application:
    name: rowing-logbook-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rowinglogbook}
    username: ${SPRING_DATASOURCE_USERNAME:rowing}
    password: ${SPRING_DATASOURCE_PASSWORD:rowing}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
